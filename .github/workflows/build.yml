name: build
on: [push, pull_request]

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Disable Forge telemetry
        run: npx forge settings set usage-analytics false

      - name: Run ESLint
        run: npm run lint:js

      - name: Type check
        run: npm run lint:tsc

      - name: Build Forge app
        run: npm run build

      - name: Lint Forge app
        run: npm run lint:forge
        env:
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}

  storybook:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          npm ci --prefer-offline --prefix src/storybook

      - name: Lint Storybook
        run: npm run --prefix=src/storybook lint

      - name: Build Storybook
        run: npm run --prefix=src/storybook build-storybook
        env:
          BASE: /${{ github.event.repository.name }}/

      - name: Deploy
        if: github.ref_name == 'master'
        uses: remarkablemark/gitploy-action@v1
        with:
          directory: src/storybook/storybook-static
